<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPuff – Class Detail</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .detail-wrap {
      width: 100%;
      max-width: 720px;
      padding: 20px 24px 60px;
      margin: 0 auto;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .85rem; color: var(--text-light);
      text-decoration: none; margin-bottom: 10px; padding: 6px 0;
    }
    .back-link:hover { color: var(--circle-bg); }

    .class-name-input {
      border: none;
      background: transparent;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      outline: none;
      width: 100%;
      padding: 0;
      margin-bottom: 10px;
    }
    .class-name-input::placeholder { color: #aaa; }

    .summary-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .sum-chip {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 110px;
      box-shadow: var(--shadow);
    }
    .sum-chip .label { font-size: .68rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .4px; }
    .sum-chip .val   { font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .sum-chip.hero .val { color: var(--circle-bg); }

    .assignments-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .assignment-row {
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      transition: box-shadow .15s;
      animation: slideIn .22s ease both;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
    .assignment-row:hover { box-shadow: 0 4px 14px rgba(0,0,0,.14); }

    .assignment-name-input {
      border: none;
      background: transparent;
      padding: 6px 0;
      font-size: .95rem;
      color: var(--text);
      outline: none;
      min-width: 0;
    }
    .assignment-name-input::placeholder { color: #bbb; }

    .num-input {
      width: 70px;
      border: 1.5px solid var(--border);
      background: var(--white);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: .88rem;
      font-weight: 700;
      color: var(--text);
      text-align: right;
      outline: none;
      transition: border-color .15s;
    }
    .num-input:focus { border-color: var(--circle-bg); }

    .num-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .num-stack .num-label {
      font-size: .62rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .4px;
      font-weight: 600;
    }

    .del-row-btn {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: .95rem;
      padding: 8px 10px; border-radius: 6px;
      transition: color .12s, background .12s;
    }
    .del-row-btn:hover { color: #cc4444; background: #ffeaea; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 40px 20px; text-align: center;
    }
    .empty-state img { width: 80px; opacity: .65; }
    .empty-state h3 { font-size: .95rem; font-weight: 700; color: var(--text); }
    .empty-state p  { font-size: .83rem; color: var(--text-light); max-width: 260px; line-height: 1.6; }

    .add-row {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      margin-top: 16px;
    }
    .add-row-hint { font-size: .78rem; color: var(--text-light); }

    /* Gauge bar for class average */
    .gauge {
      position: relative;
      width: 100%;
      height: 10px;
      background: var(--chip-bg, rgba(0,0,0,.06));
      border-radius: 99px;
      overflow: hidden;
      margin: 6px 0 18px;
    }
    .gauge-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #cc4444, #e8a74a, #4a7c59);
      transition: width .45s ease;
    }
  </style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-logo">
    <img src="../assets/sheep.svg" alt="StudyPuff sheep">
    <span>StudyPuff</span>
  </div>
  <nav>
    <a href="index.html"><span class="nav-icon">⏱</span> Timer</a>
    <a href="task-list.html"><span class="nav-icon">📋</span> Task List</a>
    <a href="statistics.html"><span class="nav-icon">📊</span> Statistics</a>
    <a href="rewards.html"><span class="nav-icon">🪙</span> Rewards</a>
    <a href="settings.html"><span class="nav-icon">⚙</span> Settings</a>
  </nav>
</div>

<div class="top-bar">
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  <span class="page-title" id="pageTitle">Class</span>
  <a class="coin-badge" href="rewards.html">
    <div class="coin-icon">🪙</div>
    <span class="coin-count">0</span>
    <div class="coin-plus">+</div>
  </a>
</div>

<div class="page">
  <div class="detail-wrap">
    <a href="grade-tracker.html" class="back-link">← Back to Grade Tracker</a>

    <input type="text" class="class-name-input" id="classNameInput" placeholder="Class name…">

    <div class="summary-strip">
      <div class="sum-chip hero">
        <span class="label">Weighted average</span>
        <span class="val" id="avgDisplay">—</span>
      </div>
      <div class="sum-chip">
        <span class="label">Assignments</span>
        <span class="val" id="countDisplay">0</span>
      </div>
      <div class="sum-chip">
        <span class="label">Total weight</span>
        <span class="val" id="weightDisplay">0%</span>
      </div>
    </div>

    <div class="gauge"><div class="gauge-fill" id="gaugeFill" style="width:0%"></div></div>

    <div class="assignments-list" id="assignmentsList"></div>

    <div class="add-row">
      <button class="add-btn" id="addAssignmentBtn" title="Add assignment">+</button>
      <span class="add-row-hint">Add an assignment</span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const classId = parseInt(params.get('id') || '0', 10);
  let classes   = getClasses();
  let cls       = classes[classId];

  if (!cls) { location.href = 'grade-tracker.html'; }

  const nameInput = document.getElementById('classNameInput');
  nameInput.value = cls.name || '';
  document.getElementById('pageTitle').textContent = cls.name || 'Class';
  document.title = `StudyPuff – ${cls.name || 'Class'}`;

  nameInput.addEventListener('input', () => {
    cls.name = nameInput.value;
    save();
    document.getElementById('pageTitle').textContent = cls.name || 'Class';
    document.title = `StudyPuff – ${cls.name || 'Class'}`;
  });

  function calcAvg() {
    const ass = cls.assignments || [];
    if (ass.length === 0) return null;
    const totalW = ass.reduce((a, x) => a + (parseFloat(x.weight)||0), 0);
    if (totalW === 0) return null;
    const weighted = ass.reduce((a, x) => a + (parseFloat(x.weight)||0) * (parseFloat(x.grade)||0), 0);
    return weighted / totalW;
  }
  function totalWeight() {
    return (cls.assignments || []).reduce((a, x) => a + (parseFloat(x.weight)||0), 0);
  }

  function updateSummary() {
    const avg = calcAvg();
    const ass = cls.assignments || [];
    document.getElementById('avgDisplay').textContent = avg == null ? '—' : avg.toFixed(1);
    document.getElementById('countDisplay').textContent = ass.length;
    document.getElementById('weightDisplay').textContent = totalWeight() + '%';
    // Gauge assumes average on a 0..10 scale
    const pct = avg == null ? 0 : Math.max(0, Math.min(100, (avg / 10) * 100));
    document.getElementById('gaugeFill').style.width = pct + '%';
  }

  function save() {
    classes[classId] = cls;
    setClasses(classes);
    updateSummary();
  }

  function renderAssignments() {
    const list = document.getElementById('assignmentsList');
    list.innerHTML = '';
    const ass = cls.assignments || [];

    if (ass.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <img src="../assets/sheep.svg" alt="sheep">
          <h3>No assignments yet</h3>
          <p>Tap + to add your first assignment. Set a weight and a grade to compute your average.</p>
        </div>`;
      updateSummary();
      return;
    }

    ass.forEach((asgn, i) => {
      const row = document.createElement('div');
      row.className = 'assignment-row';
      row.style.animationDelay = (i * 0.035) + 's';

      const name = document.createElement('input');
      name.type = 'text';
      name.className = 'assignment-name-input';
      name.value = asgn.name || '';
      name.placeholder = 'Assignment…';
      name.addEventListener('input', (e) => { cls.assignments[i].name = e.target.value; save(); });

      const gradeStack = document.createElement('div');
      gradeStack.className = 'num-stack';
      const gradeLabel = document.createElement('span');
      gradeLabel.className = 'num-label';
      gradeLabel.textContent = 'Grade';
      const gradeInput = document.createElement('input');
      gradeInput.type = 'number';
      gradeInput.className = 'num-input';
      gradeInput.min = 0; gradeInput.max = 10; gradeInput.step = '0.1';
      gradeInput.value = asgn.grade || '';
      gradeInput.placeholder = '0';
      gradeInput.addEventListener('input', (e) => { cls.assignments[i].grade = e.target.value; save(); });
      gradeStack.appendChild(gradeLabel);
      gradeStack.appendChild(gradeInput);

      const weightStack = document.createElement('div');
      weightStack.className = 'num-stack';
      const weightLabel = document.createElement('span');
      weightLabel.className = 'num-label';
      weightLabel.textContent = 'Weight %';
      const weightInput = document.createElement('input');
      weightInput.type = 'number';
      weightInput.className = 'num-input';
      weightInput.min = 0; weightInput.max = 100; weightInput.step = '1';
      weightInput.value = asgn.weight || '';
      weightInput.placeholder = '0';
      weightInput.addEventListener('input', (e) => { cls.assignments[i].weight = e.target.value; save(); });
      weightStack.appendChild(weightLabel);
      weightStack.appendChild(weightInput);

      const del = document.createElement('button');
      del.className = 'del-row-btn';
      del.innerHTML = '🗑';
      del.title = 'Remove assignment';
      del.addEventListener('click', () => {
        row.classList.add('sp-leaving');
        SPFeedback.vibrate(10);
        setTimeout(() => {
          cls.assignments.splice(i, 1);
          save();
          renderAssignments();
          SPFeedback.toast('Assignment removed', { icon: '🗑', kind: 'warn', ms: 1400 });
        }, 260);
      });

      row.appendChild(name);
      row.appendChild(gradeStack);
      row.appendChild(weightStack);
      row.appendChild(del);
      list.appendChild(row);
    });

    updateSummary();
  }

  document.getElementById('addAssignmentBtn').addEventListener('click', (e) => {
    if (!cls.assignments) cls.assignments = [];
    cls.assignments.push({ name: '', weight: '', grade: '' });
    save();
    renderAssignments();
    addCoins(1, { from: e.currentTarget });
    const inputs = document.querySelectorAll('.assignment-name-input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  });

  renderAssignments();
</script>
</body>
</html>
