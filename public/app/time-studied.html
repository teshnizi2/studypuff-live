<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPuff – Time Studied</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .charts-row {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      padding: 28px 24px 60px;
      max-width: 960px;
      width: 100%;
    }
    .big-chart-card {
      background: var(--white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 20px;
      flex: 1 1 380px;
      max-width: 480px;
      min-width: 280px;
    }
    .big-chart-card h3 {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 14px;
    }
    .chart-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }
    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .legend-item {
      font-size: .76rem;
      color: var(--text-light);
      display: flex;
      align-items: center;
    }
    .canvas-wrap {
      position: relative;
      height: 240px;
    }
    .canvas-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .85rem;
      color: var(--text-light);
      text-decoration: none;
      margin-bottom: 16px;
      padding: 6px 0;
    }
    .back-link:hover { color: var(--circle-bg); }
  </style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-logo">
    <img src="../assets/sheep.svg" alt="StudyPuff sheep">
    <span>StudyPuff</span>
  </div>
  <nav>
    <a href="index.html"><span class="nav-icon">⏱</span> Timer</a>
    <a href="task-list.html"><span class="nav-icon">📋</span> Task List</a>
    <a href="statistics.html"><span class="nav-icon">📊</span> Statistics</a>
    <a href="rewards.html"><span class="nav-icon">🪙</span> Rewards</a>
    <a href="settings.html"><span class="nav-icon">⚙</span> Settings</a>
  </nav>
</div>

<div class="top-bar">
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  <span class="page-title">Time Studied</span>
  <a class="coin-badge" href="rewards.html">
    <div class="coin-icon">🪙</div>
    <span class="coin-count">0</span>
    <div class="coin-plus">+</div>
  </a>
</div>

<div class="page">
  <div style="width:100%;max-width:960px;padding:20px 24px 0;">
    <a href="statistics.html" class="back-link">← Back to Statistics</a>
  </div>
  <div class="charts-row">

    <!-- Grouped Bar: last week vs this week -->
    <div class="big-chart-card">
      <h3>Studied Time</h3>
      <div class="chart-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#a8c4e0;"></span> Last week</span>
        <span class="legend-item"><span class="legend-dot" style="background:#2e6a9e;"></span> This week</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <!-- Pie: time per task -->
    <div class="big-chart-card">
      <h3>Studied Time</h3>
      <div class="canvas-wrap">
        <canvas id="pieChart"></canvas>
      </div>
    </div>

  </div>
</div>

<script src="js/app.js"></script>
<script>
  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  function minutesPerDay(sessions, weekDates) {
    return weekDates.map(d =>
      sessions.filter(s => s.date === d).reduce((a,s) => a + (s.minutes||0), 0)
    );
  }

  const sessions  = getSessions();
  const thisWeek  = getWeekDates(0);
  const lastWeek  = getWeekDates(-7);

  // ── Bar chart ───────────────────────────────────────────────
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: DAYS,
      datasets: [
        {
          label: 'Last week',
          data: minutesPerDay(sessions, lastWeek),
          backgroundColor: '#a8c4e0',
          borderRadius: 3
        },
        {
          label: 'This week',
          data: minutesPerDay(sessions, thisWeek),
          backgroundColor: '#2e6a9e',
          borderRadius: 3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 9 } }, grid: { display: false } },
        y: { min: 0, ticks: { font: { size: 9 } }, title: { display: false } }
      }
    }
  });

  // ── Pie chart: minutes per task ────────────────────────────
  (function() {
    const taskMap = {};
    sessions.forEach(s => {
      const k = s.taskName || 'Untitled';
      taskMap[k] = (taskMap[k] || 0) + (s.minutes || 0);
    });
    const labels = Object.keys(taskMap);
    const data   = Object.values(taskMap);

    if (labels.length === 0) {
      // placeholder
      labels.push('Task 1','Task 2','Task 3');
      data.push(35,45,20);
    }

    const COLORS = ['#2e6a9e','#e8724a','#a8c4e0','#5ba55b','#d4a843','#9b59b6'];

    new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: labels.map((_,i) => COLORS[i % COLORS.length]),
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'right',
            labels: { font: { size: 10 }, boxWidth: 12 }
          }
        }
      }
    });
  })();
</script>
</body>
</html>
