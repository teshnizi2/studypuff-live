<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPuff – Grade Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .grade-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 14px 0 0;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .15s;
    }
    .grade-row:hover { box-shadow: 0 4px 16px rgba(0,0,0,.16); }
    .avg-cell {
      background: #f0f0f0;
      padding: 14px 12px;
      font-size: .82rem;
      font-weight: 700;
      color: var(--text-light);
      white-space: nowrap;
      border-right: 1.5px solid var(--border);
      min-width: 58px;
      text-align: center;
      flex-shrink: 0;
    }
    .class-input {
      flex: 1;
      border: none;
      padding: 14px 10px;
      font-size: .95rem;
      color: var(--text);
      background: transparent;
      outline: none;
      cursor: text;
    }
    .grade-arrow { color: var(--text-light); font-size: 1.1rem; }
    .delete-btn {
      background: none; border: none; cursor: pointer;
      color: #cc4444; font-size: 1rem; padding: 4px 6px;
      border-radius: 6px; transition: background .12s;
    }
    .delete-btn:hover { background: #ffeaea; }
    .add-row { display: flex; justify-content: center; margin-top: 8px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .85rem; color: var(--text-light);
      text-decoration: none; margin-bottom: 16px; padding: 6px 0;
    }
    .back-link:hover { color: var(--circle-bg); }
  </style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-logo">
    <img src="../assets/sheep.svg" alt="StudyPuff sheep">
    <span>StudyPuff</span>
  </div>
  <nav>
    <a href="index.html"><span class="nav-icon">⏱</span> Timer</a>
    <a href="task-list.html"><span class="nav-icon">📋</span> Task List</a>
    <a href="statistics.html"><span class="nav-icon">📊</span> Statistics</a>
    <a href="rewards.html"><span class="nav-icon">🪙</span> Rewards</a>
    <a href="settings.html"><span class="nav-icon">⚙</span> Settings</a>
  </nav>
</div>

<div class="top-bar">
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  <span class="page-title">Grade Tracker</span>
  <a class="coin-badge" href="rewards.html">
    <div class="coin-icon">🪙</div>
    <span class="coin-count">0</span>
    <div class="coin-plus">+</div>
  </a>
</div>

<div class="page">
  <div class="list-area">
    <a href="statistics.html" class="back-link">← Back to Statistics</a>
    <div id="classList"></div>
    <div class="add-row">
      <button class="add-btn" id="addClassBtn" title="Add class">+</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  let classes = getClasses();

  function calcAvg(cls) {
    if (!cls.assignments || cls.assignments.length === 0) return '—';
    const weights = cls.assignments.map(a => parseFloat(a.weight) || 0);
    const grades  = cls.assignments.map(a => parseFloat(a.grade)  || 0);
    const totalW  = weights.reduce((a,b) => a+b, 0);
    if (totalW === 0) return '—';
    const weighted = weights.reduce((s, w, i) => s + w * grades[i], 0);
    return (weighted / totalW).toFixed(1);
  }

  function save() { setClasses(classes); }

  function renderClasses() {
    const list = document.getElementById('classList');
    list.innerHTML = '';
    classes.forEach((cls, i) => {
      const row = document.createElement('div');
      row.className = 'grade-row';

      const avgCell = document.createElement('div');
      avgCell.className = 'avg-cell';
      avgCell.textContent = `Avg ${calcAvg(cls)}`;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'class-input';
      input.value = cls.name || '';
      input.placeholder = 'Class name…';
      input.addEventListener('input', (e) => {
        classes[i].name = e.target.value;
        save();
      });
      input.addEventListener('click', (e) => e.stopPropagation());

      const arrow = document.createElement('span');
      arrow.className = 'grade-arrow';
      arrow.textContent = '›';

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const removed = classes[i]?.name || 'Class';
        row.classList.add('sp-leaving');
        SPFeedback.vibrate(10);
        setTimeout(() => {
          classes.splice(i, 1);
          save();
          renderClasses();
          SPFeedback.toast(`Removed "${removed}"`, { icon: '🗑', kind: 'warn', ms: 1400 });
        }, 260);
      });

      row.appendChild(avgCell);
      row.appendChild(input);
      row.appendChild(arrow);
      row.appendChild(delBtn);

      row.addEventListener('click', () => {
        window.location.href = `class-detail.html?id=${i}`;
      });

      list.appendChild(row);
    });
  }

  document.getElementById('addClassBtn').addEventListener('click', (e) => {
    classes.push({ name: '', avg: '—', assignments: [] });
    save();
    renderClasses();
    addCoins(1, { from: e.currentTarget });
    SPFeedback.toast('Class added', { icon: '📚', kind: 'success', ms: 1400 });
    const inputs = document.querySelectorAll('.class-input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  });

  renderClasses();
</script>
</body>
</html>
