<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPuff – Your Statistics</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .page-wrap {
      width: 100%;
      max-width: 960px;
      padding: 20px 24px 60px;
      margin: 0 auto;
    }
    .section-title {
      font-size: .78rem;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin: 22px 4px 10px;
    }
    .section-title:first-child { margin-top: 4px; }

    /* ── Summary grid ────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }
    .summary-card {
      background: var(--white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: transform .15s;
    }
    .summary-card:hover { transform: translateY(-2px); }
    .summary-card .sc-label {
      font-size: .72rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .4px;
      font-weight: 600;
    }
    .summary-card .sc-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .summary-card .sc-value .unit { font-size: .8rem; font-weight: 600; color: var(--text-light); }
    .summary-card .sc-sub {
      font-size: .75rem;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ── Heatmap ─────────────────────────── */
    .heatmap-card {
      background: var(--white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 18px 16px 14px;
    }
    .heatmap-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .heatmap-head h4 {
      font-size: .88rem;
      font-weight: 700;
      color: var(--text);
    }
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .7rem;
      color: var(--text-light);
    }
    .hl-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
    .heatmap-wrap {
      overflow-x: auto;
      padding: 2px 2px 6px;
    }
    .heatmap {
      display: inline-grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(7, 12px);
      gap: 3px;
    }
    .heatmap .cell {
      width: 12px; height: 12px;
      border-radius: 2px;
      background: var(--chip-bg, #eaeaea);
      transition: transform .1s;
    }
    .heatmap .cell:hover { transform: scale(1.4); }
    .heatmap .cell.l1 { background: rgba(74,124,89,.22); }
    .heatmap .cell.l2 { background: rgba(74,124,89,.45); }
    .heatmap .cell.l3 { background: rgba(74,124,89,.7); }
    .heatmap .cell.l4 { background: rgba(74,124,89,1); }
    body.dark .heatmap .cell.l1 { background: rgba(130,200,150,.22); }
    body.dark .heatmap .cell.l2 { background: rgba(130,200,150,.45); }
    body.dark .heatmap .cell.l3 { background: rgba(130,200,150,.72); }
    body.dark .heatmap .cell.l4 { background: rgba(130,200,150,1); }
    .heatmap-foot {
      display: flex;
      justify-content: space-between;
      font-size: .7rem;
      color: var(--text-light);
      margin-top: 8px;
    }

    /* ── Chart cards ─────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform .15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card h3 {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-light);
    }
    .stat-canvas-wrap {
      width: 100%;
      height: 140px;
      position: relative;
    }
    .stat-canvas-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }
    .view-btn { align-self: center; margin-top: 2px; }
  </style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-logo">
    <img src="../assets/sheep.svg" alt="StudyPuff sheep">
    <span>StudyPuff</span>
  </div>
  <nav>
    <a href="index.html"><span class="nav-icon">⏱</span> Timer</a>
    <a href="task-list.html"><span class="nav-icon">📋</span> Task List</a>
    <a href="statistics.html"><span class="nav-icon">📊</span> Statistics</a>
    <a href="rewards.html"><span class="nav-icon">🪙</span> Rewards</a>
    <a href="settings.html"><span class="nav-icon">⚙</span> Settings</a>
  </nav>
</div>

<div class="top-bar">
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  <span class="page-title">Your Statistics</span>
  <a class="coin-badge" href="rewards.html">
    <div class="coin-icon">🪙</div>
    <span class="coin-count">0</span>
    <div class="coin-plus">+</div>
  </a>
</div>

<div class="page">
  <div class="page-wrap">

    <!-- ── Summary ───────────────────── -->
    <div class="section-title">At a glance</div>
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- ── Heatmap ───────────────────── -->
    <div class="section-title">Study heatmap</div>
    <div class="heatmap-card">
      <div class="heatmap-head">
        <h4>Last 12 weeks</h4>
        <div class="heatmap-legend">
          <span>Less</span>
          <span class="hl-swatch" style="background: var(--chip-bg, #eaeaea)"></span>
          <span class="hl-swatch" style="background: rgba(74,124,89,.22)"></span>
          <span class="hl-swatch" style="background: rgba(74,124,89,.45)"></span>
          <span class="hl-swatch" style="background: rgba(74,124,89,.7)"></span>
          <span class="hl-swatch" style="background: rgba(74,124,89,1)"></span>
          <span>More</span>
        </div>
      </div>
      <div class="heatmap-wrap">
        <div class="heatmap" id="heatmap"></div>
      </div>
      <div class="heatmap-foot">
        <span id="heatmapStart">—</span>
        <span id="heatmapEnd">Today</span>
      </div>
    </div>

    <!-- ── Chart cards ───────────────── -->
    <div class="section-title">Breakdowns</div>
    <div class="stats-grid">

      <div class="stat-card">
        <h3>Time Studied (this week)</h3>
        <div class="stat-canvas-wrap">
          <canvas id="timeChart"></canvas>
        </div>
        <a class="pill-btn view-btn" href="time-studied.html">View Time Studied</a>
      </div>

      <div class="stat-card">
        <h3>Grade Tracker</h3>
        <div class="stat-canvas-wrap">
          <canvas id="gradeChart"></canvas>
        </div>
        <a class="pill-btn view-btn" href="grade-tracker.html">View Grade Tracker</a>
      </div>

      <div class="stat-card">
        <h3>Productivity (this week)</h3>
        <div class="stat-canvas-wrap">
          <canvas id="productivityChart"></canvas>
        </div>
        <a class="pill-btn view-btn" href="productivity.html">View Productivity Level</a>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  const DAYS_SHORT = ['M','T','W','T','F','S','S'];

  // ── Summary cards ────────────────────────────────────────
  function renderSummary() {
    const sessions = getSessions().filter(s => (s.mode || 'focus') === 'focus');
    const total    = sessions.reduce((a, s) => a + (s.minutes || 0), 0);

    const thisWeek = getWeekDates(0);
    const weekMins = sessions
      .filter(s => thisWeek.includes(s.date))
      .reduce((a, s) => a + (s.minutes || 0), 0);

    const streak = computeStreak();

    const goal = getSettings().dailyGoalMin || 60;
    const last7 = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      last7.push(d.toISOString().slice(0,10));
    }
    const daysHit = last7.filter(d => minutesOnDate(d) >= goal).length;

    const totalH   = Math.floor(total / 60);
    const totalMin = total % 60;
    const weekH    = Math.floor(weekMins / 60);
    const weekMn   = weekMins % 60;

    const cards = [
      {
        label: 'This week',
        value: weekH > 0 ? `${weekH}` : `${weekMn}`,
        unit:  weekH > 0 ? `h ${weekMn}m` : `min`,
        sub:   `${weekH === 0 && weekMn === 0 ? 'No sessions yet' : 'Keep going'}`,
      },
      {
        label: 'All-time focus',
        value: totalH > 0 ? `${totalH}` : `${total}`,
        unit:  totalH > 0 ? `h ${totalMin}m` : `min`,
        sub:   `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`,
      },
      {
        label: 'Streak',
        value: `${streak}`,
        unit:  streak === 1 ? 'day' : 'days',
        sub:   streak >= 3 ? '🔥 on fire' : (streak === 0 ? 'Start today' : 'Keep it up'),
      },
      {
        label: 'Goal hit rate',
        value: `${daysHit}`,
        unit:  '/ 7 days',
        sub:   `Goal: ${goal} min/day`,
      },
    ];

    const grid = document.getElementById('summaryGrid');
    grid.innerHTML = '';
    cards.forEach(c => {
      const el = document.createElement('div');
      el.className = 'summary-card';
      el.innerHTML = `
        <div class="sc-label">${c.label}</div>
        <div class="sc-value">${c.value}<span class="unit">${c.unit}</span></div>
        <div class="sc-sub">${c.sub}</div>`;
      grid.appendChild(el);
    });
  }

  // ── Heatmap (12 weeks = 84 days, Mon-Sun columns) ────────
  function renderHeatmap() {
    const weeks = 12;
    const totalDays = weeks * 7;
    const today = new Date();
    const dow   = today.getDay(); // 0=Sun
    const monOffset = (dow + 6) % 7; // days since Monday of this week
    const lastMonday = new Date(today); lastMonday.setDate(today.getDate() - monOffset);
    const startDate  = new Date(lastMonday); startDate.setDate(lastMonday.getDate() - (weeks - 1) * 7);

    const heatmap = document.getElementById('heatmap');
    heatmap.innerHTML = '';

    const dates = [];
    for (let i = 0; i < totalDays; i++) {
      const d = new Date(startDate);
      d.setDate(startDate.getDate() + i);
      dates.push(d);
    }

    // Columns are Mon-Sun, so we iterate weeks × 7 days — grid-auto-flow: column fills top to bottom
    dates.forEach(d => {
      const iso = d.toISOString().slice(0,10);
      const mins = minutesOnDate(iso);
      let lvl = 0;
      if (mins > 0)  lvl = 1;
      if (mins >= 20) lvl = 2;
      if (mins >= 45) lvl = 3;
      if (mins >= 90) lvl = 4;
      const cell = document.createElement('div');
      cell.className = 'cell' + (lvl ? ' l' + lvl : '');
      cell.title = `${iso} — ${mins} min`;
      heatmap.appendChild(cell);
    });

    const fmt = d => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    document.getElementById('heatmapStart').textContent = fmt(startDate);
    document.getElementById('heatmapEnd').textContent = 'Today';
  }

  // ── Chart defaults ───────────────────────────────────────
  const gridColor = () => document.body.classList.contains('dark') ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)';
  const textColor = () => document.body.classList.contains('dark') ? '#aaa' : '#666';

  function lineOpts(maxVal) {
    return {
      type: 'line',
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { size: 9 }, color: textColor() }, grid: { display: false } },
          y: { min: 0, max: maxVal, ticks: { stepSize: maxVal/5, font: { size: 9 }, color: textColor() }, grid: { color: gridColor() } }
        },
        elements: { point: { radius: 3 }, line: { tension: .35 } }
      }
    };
  }

  function drawCharts() {
    // Time studied (hours)
    (function() {
      const sessions = getSessions().filter(s => (s.mode || 'focus') === 'focus');
      const thisWeek = getWeekDates(0);
      const data = thisWeek.map(d => {
        const mins = sessions.filter(s => s.date === d).reduce((a,s) => a + (s.minutes||0), 0);
        return +(mins/60).toFixed(1);
      });
      const maxH = Math.max(2, Math.ceil(Math.max(...data, 1)));
      const opts = lineOpts(maxH);
      new Chart(document.getElementById('timeChart'), {
        ...opts,
        data: {
          labels: DAYS_SHORT,
          datasets: [{ data, borderColor: 'var(--circle-bg)', backgroundColor: 'var(--accent-bg-10)', fill: true }]
        }
      });
    })();

    // Grade
    (function() {
      const classes = getClasses();
      const labels = classes.map(c => c.name || '?');
      const data   = classes.map(c => {
        if (!c.assignments || c.assignments.length === 0) return 0;
        const ws = c.assignments.reduce((a,x) => a + (parseFloat(x.weight)||0), 0);
        if (!ws) return 0;
        const sum = c.assignments.reduce((a,x) => a + (parseFloat(x.weight)||0)*(parseFloat(x.grade)||0), 0);
        return +(sum/ws).toFixed(1);
      });
      const opts = lineOpts(10);
      new Chart(document.getElementById('gradeChart'), {
        ...opts,
        data: {
          labels: labels.length ? labels : ['No classes'],
          datasets: [{
            data: data.length ? data : [0],
            borderColor: 'var(--circle-bg)',
            backgroundColor: 'var(--accent-bg-10)',
            fill: true
          }]
        }
      });
    })();

    // Productivity
    (function() {
      const log = getProductivityLog();
      const thisWeek = getWeekDates(0);
      const data = thisWeek.map(d => {
        const entry = log.find(e => e.date === d);
        return entry ? +(entry.focusScore || 0).toFixed(1) : 0;
      });
      const opts = lineOpts(10);
      new Chart(document.getElementById('productivityChart'), {
        ...opts,
        data: {
          labels: DAYS_SHORT,
          datasets: [{ data, borderColor: 'var(--circle-bg)', backgroundColor: 'var(--accent-bg-10)', fill: true }]
        }
      });
    })();
  }

  renderSummary();
  renderHeatmap();
  drawCharts();
</script>
</body>
</html>
